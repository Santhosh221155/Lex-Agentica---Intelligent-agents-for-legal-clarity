[alembic]
# Use a relative path so running `alembic` from the `backend/` folder works.
# Previously this pointed to `backend/alembic` which caused a doubled path
# (backend/backend/alembic) when running from within the `backend` directory.
script_location = alembic
sqlalchemy.url = sqlite:///alembic_fallback.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers = console
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
